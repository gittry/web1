<button onclick="printSilent()">🖨 Cetak Langsung (Silent)</button>

<script>
function printSilent() {
    if (!selectedFile) {
        alert("Pilih foto dulu!");
        return;
    }

    const reader = new FileReader();
    reader.onload = function(e) {
        const base64 = e.target.result.split(',')[1];
        
        // Intent RawBT yang lebih clean
        const intentUrl = `rawbt:data:image/jpeg;base64,${base64}`;
        
        window.location.href = intentUrl;   // Cara paling smooth
        // Alternatif:
        // const a = document.createElement('a');
        // a.href = intentUrl;
        // a.click();
    };
    reader.readAsDataURL(selectedFile);
}
</script>
