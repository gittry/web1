<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cetak 1 Foto - RawBT (Kualitas Tinggi)</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; padding: 20px; background: #f4f4f4; }
        #preview { max-width: 380px; border: 3px solid #28a745; border-radius: 10px; margin: 20px auto; display: none; }
        button { padding: 14px 32px; font-size: 18px; margin: 15px; border: none; border-radius: 8px; background: #007bff; color: white; }
    </style>
</head>
<body>
    <h1>Cetak 1 Foto (Kualitas Optimal)</h1>

    <input type="file" id="fileInput" accept="image/*">
    <br><br>
    <img id="preview" src="" alt="Preview">

    <button onclick="printWithHighQuality()">🖨 CETAK DENGAN KUALITAS TINGGI</button>

    <script>
        let selectedFile = null;

        document.getElementById('fileInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                selectedFile = file;
                const reader = new FileReader();
                reader.onload = function(ev) {
                    document.getElementById('preview').src = ev.target.result;
                    document.getElementById('preview').style.display = 'block';
                };
                reader.readAsDataURL(file);
            }
        });

        async function printWithHighQuality() {
            if (!selectedFile) {
                alert("Pilih foto terlebih dahulu!");
                return;
            }

            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');

                    // Resize sedikit untuk keseimbangan kualitas & ukuran
                    const maxWidth = 600;
                    let width = img.width;
                    let height = img.height;

                    if (width > maxWidth) {
                        height = (maxWidth * height) / width;
                        width = maxWidth;
                    }

                    canvas.width = width;
                    canvas.height = height;
                    ctx.drawImage(img, 0, 0, width, height);

                    // Kualitas tinggi
                    const finalBase64 = canvas.toDataURL('image/jpeg', 0.92);
                    const base64Data = finalBase64.split(',')[1];

                    const intentUrl = `rawbt:data:image/jpeg;base64,${base64Data}`;

                    const link = document.createElement('a');
                    link.href = intentUrl;
                    link.style.display = 'none';
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);

                    alert("✅ Foto dikirim ke RawBT dengan kualitas tinggi.\n\nTips: Naikkan Print Density di pengaturan RawBT untuk hasil lebih bagus.");
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(selectedFile);
        }
    </script>
</body>
</html>
