<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Untuk Maryana Isti Pranandani - Buket Cinta</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap');

        :root {
            --bg-color: #790e15; 
            --text-color: #ffffff;
            --accent-color: #e5b6b6;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Playfair Display', serif;
            width: 100vw;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            background: radial-gradient(circle at center, #8a131a 0%, #5a090f 100%);
            animation: fadeIn 1.5s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        .main-container {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 20px;
        }

        /* Pembungkus Buket (Rasio 1536x1024 / 3:2) */
        .bouquet-wrapper {
            position: relative;
            width: 85vw;
            max-width: 480px;
            aspect-ratio: 1.5 / 1; 
            display: flex;
            justify-content: center;
            align-items: center;
            margin-top: 40px;
            margin-bottom: 20px;
            animation: floatBouquet 4s ease-in-out infinite;
        }

        @keyframes floatBouquet {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        /* Lapisan Gambar */
        .layer-img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .layer-back {
            z-index: 1;
            filter: drop-shadow(0px 15px 25px rgba(0,0,0,0.5));
        }

        .layer-front {
            z-index: 10;
            filter: drop-shadow(0px 5px 10px rgba(0,0,0,0.2));
        }

        /* Area Foto di Tengah Buket */
        .photos-area {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 5;
        }

        .pic {
            position: absolute;
            width: 25%;
            aspect-ratio: 3/4;
            object-fit: cover;
            border: 4px solid #fff;
            border-bottom: 12px solid #fff; /* Efek polaroid klasik */
            border-radius: 4px;
            box-shadow: 2px 8px 15px rgba(0,0,0,0.4);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            background-color: #fff;
            cursor: pointer;
        }

        .pic:hover {
            z-index: 20 !important;
            transform: scale(1.15) translateY(-15px) !important;
            box-shadow: 5px 15px 25px rgba(0,0,0,0.6);
        }

        /* Penataan Posisi 3 Foto yang Rapi */
        .p1 {
            top: 18%;
            left: 18%;
            transform: rotate(-15deg);
            z-index: 6;
        }

        .p2 {
            top: 6%;
            left: 50%;
            width: 28%; /* Foto tengah sedikit lebih besar */
            transform: translateX(-50%) rotate(0deg);
            z-index: 7;
        }

        .p3 {
            top: 18%;
            right: 18%;
            transform: rotate(15deg);
            z-index: 6;
        }

        /* Teks Melingkar Rapi di Sekitar Buket */
        .text-svg {
            position: absolute;
            top: -30%;
            left: -15%;
            width: 130%;
            height: 130%;
            z-index: 2;
            pointer-events: none;
            filter: drop-shadow(0px 2px 4px rgba(0,0,0,0.4));
        }

        /* Tombol Next */
        .btn-next-text {
            position: relative;
            z-index: 20;
            margin-top: 40px;
            background: rgba(229, 182, 182, 0.15);
            color: var(--accent-color);
            border: 1px solid var(--accent-color);
            padding: 10px 35px;
            border-radius: 30px;
            font-size: 1rem;
            font-family: 'Playfair Display', serif;
            font-weight: 700;
            cursor: pointer;
            text-decoration: none;
            letter-spacing: 3px;
            text-transform: uppercase;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            backdrop-filter: blur(5px);
        }

        .btn-next-text:hover {
            background: var(--accent-color);
            color: var(--bg-color);
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(229, 182, 182, 0.4);
        }

    </style>
</head>
<body>

    <div class="main-container">
        
        <div class="bouquet-wrapper">
            
            <!-- Teks melengkung yang membingkai atas buket -->
            <svg viewBox="0 0 200 200" class="text-svg">
                <!-- Lengkungan kubik yang halus dari kiri ke kanan -->
                <path id="neatCurve" d="M 20 140 C 30 20, 170 20, 180 140" fill="transparent" />
                <text>
                    <textPath href="#neatCurve" startOffset="50%" text-anchor="middle" fill="#e5b6b6" font-family="'Dancing Script', cursive" font-size="11.5" letter-spacing="1.5">
                        Aku Cinta Kamu ~ Aku Sayang Kamu ~ Aku Cinta Kamu
                    </textPath>
                </text>
            </svg>

            <!-- Aset layer paling belakang -->
            <img src="buketbelakang.png" alt="Buket Belakang" class="layer-img layer-back">

            <!-- 3 Foto tersusun rapi di tengah -->
            <div class="photos-area">
                <img src="orang1.jpg" alt="Foto 1" class="pic p1">
                <img src="orang2.jpg" alt="Foto 2" class="pic p2">
                <img src="orang3.jpg" alt="Foto 3" class="pic p3">
            </div>

            <!-- Aset layer depan menutupi ujung bawah foto -->
            <img src="buketdepan.png" alt="Buket Depan" class="layer-img layer-front">
            
        </div>

        <!-- Tombol Lanjut ke cinta3.html -->
        <div class="btn-next-text" onclick="window.location.href='cinta3.html'">NEXT</div>

    </div>

</body>
</html>
