<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Untuk Maryana Isti Pranandani - Bunga Terindah</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap');

        :root {
            --bg-color: #790e15; 
            --text-color: #ffffff;
            --accent-color: #e5b6b6;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Playfair Display', serif;
            width: 100vw;
            min-height: 100vh;
            overflow-x: hidden;
            background: radial-gradient(circle at center, #8a131a 0%, #4a050a 100%);
            animation: fadeIn 1.5s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* --- STRUKTUR UTAMA --- */
        .main-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center; /* Memastikan konten berada di tengah secara vertikal */
            gap: 2vh; /* Jarak proporsional antar elemen */
            width: 100%;
            min-height: 100vh;
            padding: 40px 20px;
            position: relative;
        }

        /* --- TEKS JUDUL BARU --- */
        .top-title {
            font-family: 'Dancing Script', cursive;
            font-size: clamp(2.8rem, 8vw, 4.5rem);
            color: var(--accent-color);
            text-align: center;
            text-shadow: 2px 3px 6px rgba(0,0,0,0.5);
            animation: fadeInDown 1.5s ease-out;
            z-index: 10;
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- PEMBUNGKUS BUKET --- */
        .stage-wrapper {
            position: relative;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 20px;
        }

        /* Ukuran Buket Diperbesar (120% dari ukuran normal di mobile) */
        .bouquet-container {
            position: relative;
            width: 125%; 
            max-width: 650px; /* Batas maksimal di desktop agar tidak pecah */
            aspect-ratio: 1536 / 1024; /* Proporsi buket asli Anda */
            z-index: 5;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* --- FOTO POLAROID --- */
        .photo-frame {
            position: absolute;
            background-color: #ffffff;
            padding: 4px 4px 14px 4px; /* Gaya Polaroid */
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            border-radius: 2px;
            z-index: 6;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
        }

        .photo-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 1px;
        }

        .photo-frame:hover {
            z-index: 12 !important;
            transform: scale(1.15) translateY(-20px) rotate(0deg) !important;
            box-shadow: 0 15px 30px rgba(0,0,0,0.7);
        }

        /* Posisi Presisi 3 Foto */
        .frame-1 {
            width: 25%;
            aspect-ratio: 3 / 4; 
            top: -12%;
            left: 17%;
            transform: rotate(-12deg);
        }

        .frame-2 {
            width: 29%; /* Foto tengah lebih besar */
            aspect-ratio: 3 / 4; 
            top: -24%;
            left: 50%;
            transform: translateX(-50%) rotate(2deg);
            z-index: 7;
        }

        .frame-3 {
            width: 25%;
            aspect-ratio: 3 / 4; 
            top: -12%;
            right: 17%;
            transform: rotate(12deg);
        }

       .buket-depan-img {
    position: absolute;
    top: 0;
    left: 10%; /* Menggeser buket ke kanan sebesar 10% */
    width: 100%;
    height: 100%;
    object-fit: contain;
    z-index: 10;
    pointer-events: none;
    filter: drop-shadow(0px 10px 25px rgba(0,0,0,0.4));
}

        /* --- TOMBOL NEXT --- */
        .btn-next-text {
            background: rgba(229, 182, 182, 0.15);
            color: var(--accent-color);
            border: 1px solid var(--accent-color);
            padding: 10px 45px;
            border-radius: 30px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            text-decoration: none;
            letter-spacing: 4px;
            text-transform: uppercase;
            transition: all 0.3s ease;
            backdrop-filter: blur(4px);
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            z-index: 20;
            margin-top: 20px;
        }

        .btn-next-text:hover {
            background: var(--accent-color);
            color: var(--bg-color);
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(229, 182, 182, 0.4);
        }

    </style>
</head>
<body>

    <div class="main-container">
        
        <h1 class="top-title">Kamu adalah bunga terindah</h1>
        
        <div class="stage-wrapper">
            <div class="bouquet-container">
                
                <div class="photo-frame frame-1">
                    <img src="orang1.jpg" alt="Kenangan 1">
                </div>
                <div class="photo-frame frame-2">
                    <img src="orang2.jpg" alt="Kenangan 2">
                </div>
                <div class="photo-frame frame-3">
                    <img src="orang3.jpg" alt="Kenangan 3">
                </div>

                <img src="buketdepan.png" alt="Buket Bunga" class="buket-depan-img">

            </div>
        </div>

        <div class="btn-next-text" onclick="window.location.href='cinta3.html'">NEXT</div>

    </div>

</body>
</html>
