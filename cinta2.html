<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Untuk Maryana Isti Pranandani - Buket Kenangan</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap');

        :root {
            --bg-color: #790e15; 
            --text-color: #ffffff;
            --accent-color: #e5b6b6;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Playfair Display', serif;
            width: 100vw;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            background: radial-gradient(circle at center, #8a131a 0%, #4a050a 100%);
            animation: fadeIn 1.5s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .main-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100vh;
            padding: 20px;
            position: relative;
        }

        /* Komposisi Utama Layout Bersih Tanpa Ketabrak */
        .stage-wrapper {
            position: relative;
            width: 100%;
            max-width: 450px;
            height: 70vh; /* Membatasi tinggi agar tidak meluber di desktop maupun mobile */
            display: flex;
            flex-direction: column;
            justify-content: flex-end; /* Memastikan buket bersandar rapi di bawah */
            align-items: center;
        }

        /* SVG Teks Melingkar Kreatif Membingkai Area Atas */
        .text-arc-container {
            position: absolute;
            top: 0;
            width: 100%;
            aspect-ratio: 1 / 1;
            z-index: 2;
            pointer-events: none;
            animation: slowRotate 20s linear infinite; /* Efek putaran romantis yang sangat lambat */
        }

        @keyframes slowRotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* Wadah Buket Dinamis */
        .bouquet-container {
            position: relative;
            width: 100%;
            aspect-ratio: 1536 / 1024; /* Menjaga proporsi file asli Anda */
            z-index: 5;
            margin-bottom: 2vh;
        }

        /* Foto Polaroid yang Diatur Proporsional Berdasarkan Ukuran Asli Anda (3:4) */
        .photo-frame {
            position: absolute;
            width: 25%; /* Mengecilkan skala agar pas masuk ke dalam pelukan buket */
            aspect-ratio: 3 / 4; 
            background-color: #ffffff;
            padding: 4px 4px 14px 4px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            border-radius: 2px;
            z-index: 6;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
        }

        .photo-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 1px;
        }

        /* Efek Hover Polaroid Pop-Up */
        .photo-frame:hover {
            z-index: 12 !important;
            transform: scale(1.2) translateY(-20px) rotate(0deg) !important;
            box-shadow: 0 15px 30px rgba(0,0,0,0.7);
        }

        /* Distribusi Posisi 3 Foto Bersandar di Atas Buket Depan */
        .frame-1 {
            top: -15%;
            left: 16%;
            transform: rotate(-12deg);
        }

        .frame-2 {
            top: -26%;
            left: 50%;
            width: 28%; /* Tengah dibuat sedikit dominan */
            transform: translateX(-50%) rotate(2deg);
            z-index: 7;
        }

        .frame-3 {
            top: -15%;
            right: 16%;
            transform: rotate(12deg);
        }

        /* Kertas Buket Depan sebagai Layer Penutup Utama */
        .buket-depan-img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
            z-index: 10;
            pointer-events: none; /* Klik bisa menembus ke foto di belakangnya */
            filter: drop-shadow(0px 10px 20px rgba(0,0,0,0.4));
        }

        /* Tombol Next Rapi Kontemporer di Bawah Buket */
        .btn-next-text {
            background: rgba(229, 182, 182, 0.15);
            color: var(--accent-color);
            border: 1px solid var(--accent-color);
            padding: 10px 40px;
            border-radius: 25px;
            font-size: 0.95rem;
            font-weight: 700;
            cursor: pointer;
            text-decoration: none;
            letter-spacing: 3px;
            text-transform: uppercase;
            transition: all 0.3s ease;
            backdrop-filter: blur(4px);
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            margin-top: 10px;
        }

        .btn-next-text:hover {
            background: var(--accent-color);
            color: var(--bg-color);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(229, 182, 182, 0.4);
        }

    </style>
</head>
<body>

    <div class="main-container">
        
        <div class="stage-wrapper">
            
            <svg viewBox="0 0 200 200" class="text-arc-container">
                <path id="circlePath" d="M 100, 100 m -75, 0 a 75,75 0 1,1 150,0 a 75,75 0 1,1 -150,0" fill="transparent" />
                <text>
                    <textPath href="#circlePath" fill="rgba(229, 182, 182, 0.4)" font-family="'Dancing Script', cursive" font-size="10.5" letter-spacing="1.8">
                        miliki hatiku selamanya • kamu adalah ketidakmungkinan yang menjadi nyata • hariku indah bersamamu •
                    </textPath>
                </text>
            </svg>

            <div class="bouquet-container">
                
                <div class="photo-frame frame-1">
                    <img src="orang1.jpg" alt="Kenangan 1">
                </div>
                <div class="photo-frame frame-2">
                    <img src="orang2.jpg" alt="Kenangan 2">
                </div>
                <div class="photo-frame frame-3">
                    <img src="orang3.jpg" alt="Kenangan 3">
                </div>

                <img src="buketdepan.png" alt="Buket Bunga" class="buket-depan-img">

            </div>
            
        </div>

        <div class="btn-next-text" onclick="window.location.href='cinta3.html'">NEXT</div>

    </div>

</body>
</html>
