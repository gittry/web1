<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bluetooth Button Detector</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 40px;
      background: #111;
      color: white;
    }
    #status {
      font-size: 32px;
      margin: 40px 0;
      padding: 30px;
      border-radius: 15px;
      min-height: 80px;
    }
    .playing { background: #006400; }
    button {
      padding: 15px 35px;
      font-size: 18px;
      margin: 10px;
    }
  </style>
</head>
<body>
  <h1>Bluetooth Play/Pause Detector</h1>
  <div id="status">Status: Paused</div>
  
  <button onclick="togglePlay()">Toggle Play/Pause</button>

  <script>
    let isPlaying = false;
    const statusEl = document.getElementById('status');

    function updateUI() {
      if (isPlaying) {
        statusEl.textContent = "▶ PLAYING (Bluetooth siap)";
        statusEl.classList.add('playing');
      } else {
        statusEl.textContent = "⏸ PAUSED";
        statusEl.classList.remove('playing');
      }
    }

    function togglePlay() {
      isPlaying = !isPlaying;
      updateUI();
      updateMediaSession();
    }

    // === MEDIA SESSION API (Kunci utama) ===
    function setupMediaSession() {
      if (!('mediaSession' in navigator)) {
        statusEl.textContent = "Browser tidak support Media Session";
        return;
      }

      // Set metadata
      navigator.mediaSession.metadata = new MediaMetadata({
        title: "Bluetooth Controller",
        artist: "No Audio Playing",
        album: "Detector Mode"
      });

      // Set state
      updateMediaSession();

      // Handler untuk tombol Bluetooth
      navigator.mediaSession.setActionHandler('play', () => {
        isPlaying = true;
        updateUI();
        updateMediaSession();
        console.log("✅ Play dari Bluetooth Headset");
      });

      navigator.mediaSession.setActionHandler('pause', () => {
        isPlaying = false;
        updateUI();
        updateMediaSession();
        console.log("✅ Pause dari Bluetooth Headset");
      });
    }

    function updateMediaSession() {
      if ('mediaSession' in navigator) {
        navigator.mediaSession.playbackState = isPlaying ? 'playing' : 'paused';
      }
    }

    // Inisialisasi
    setupMediaSession();
    updateUI();
  </script>
</body>
</html>
