<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Melodi Kenangan Kita</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap');

        :root {
            --bg-color: #59080E;
            --text-color: #ffffff;
            --accent-color: #e5b6b6;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Playfair Display', serif;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* --- ROMANTIC LOADER SCREEN --- */
        #loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: var(--bg-color);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 1.5s ease-out, visibility 1.5s ease-out;
        }

        .heart-pulser {
            width: 50px;
            height: 50px;
            background-color: var(--accent-color);
            position: relative;
            transform: rotate(-45deg);
            animation: romanticPulse 1.2s infinite alternate cubic-bezier(0.215, 0.610, 0.355, 1);
            box-shadow: 0 0 30px rgba(229,182,182,0.6);
        }

        .heart-pulser::before,
        .heart-pulser::after {
            content: '';
            width: 50px;
            height: 50px;
            background-color: var(--accent-color);
            border-radius: 50%;
            position: absolute;
        }

        .heart-pulser::before { top: -25px; left: 0; }
        .heart-pulser::after { top: 0; left: 25px; }

        .loader-text {
            font-family: 'Dancing Script', cursive;
            font-size: 2rem;
            color: var(--accent-color);
            margin-top: 50px;
            letter-spacing: 3px;
            text-shadow: 0 0 10px rgba(0,0,0,0.3);
        }

        @keyframes romanticPulse {
            0% { transform: rotate(-45deg) scale(0.9); opacity: 0.6; }
            100% { transform: rotate(-45deg) scale(1.2); opacity: 1; }
        }

        /* --- BACKGROUND BLURRED SLIDESHOW --- */
        .slideshow-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
        }

        .slide-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0;
            transition: opacity 3s ease-in-out;
            filter: brightness(0.2) blur(8px); /* Sangat gelap dan blur agar antarmuka utama bersinar */
        }

        .slide-bg.active { opacity: 1; }

        /* --- MAIN INTERFACE CONTROLLER --- */
        .main-player-container {
            position: relative;
            z-index: 10;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            gap: 40px; /* Jarak estetik antara slideshow dan piringan */
        }

        /* --- FOREGROUND ROMANTIC SLIDESHOW --- */
        .fg-slideshow-wrapper {
            position: relative;
            width: 85vw;
            max-width: 320px;
            height: 42vh; /* Ketinggian dikunci agar bingkai rapi */
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 15px 40px rgba(0,0,0,0.6);
            border: 2px solid rgba(229, 182, 182, 0.4);
            background: rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(10px);
            z-index: 15;
        }

        .fg-slide {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover; /* Menjamin gambar penuh rapi terlepas dari rasio ukurannya */
            opacity: 0;
            transform: scale(1.1); /* Efek awal membesar */
            transition: opacity 2s ease, transform 4s ease-out; /* Transisi romantis lambat */
        }

        .fg-slide.active {
            opacity: 1;
            transform: scale(1); /* Teksurnya kembali ke ukuran normal dengan anggun */
        }

        /* --- VINYL PLAYER SECTION --- */
        .vinyl-wrapper {
            position: relative;
            width: 65vw;
            max-width: 260px;
            aspect-ratio: 1 / 1; 
            border-radius: 50%;
            box-shadow: 0 15px 35px rgba(0,0,0,0.7), 0 0 0 2px rgba(255,255,255,0.05);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .vinyl-img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            animation: rotateVinyl 12s linear infinite;
            animation-play-state: paused; /* Berhenti jika lagu di pause */
            border-radius: 50%;
        }

        .vinyl-wrapper.playing .vinyl-img {
            animation-play-state: running;
        }

        @keyframes rotateVinyl {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* --- CENTER PLAY BUTTON (Tengah Piringan) --- */
        .play-btn {
            position: absolute; /* Mengunci tepat di tengah vinyl */
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 20; /* Harus di atas gambar piringan */
            background: rgba(229, 182, 182, 0.3);
            border: 2px solid var(--accent-color);
            color: var(--text-color);
            width: 60px;
            height: 60px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(5px);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 5px 20px rgba(0,0,0,0.5);
        }

        .play-btn:hover {
            background: var(--accent-color);
            color: var(--bg-color);
            width: 65px;
            height: 65px;
            box-shadow: 0 8px 30px rgba(229,182,182,0.6);
        }

        .play-btn svg {
            width: 24px;
            height: 24px;
            fill: currentColor;
            transition: transform 0.2s;
        }

    </style>
</head>
<body>

    <!-- LOADER SCREEN -->
    <div id="loader">
        <div class="heart-pulser"></div>
        <div class="loader-text">Menyinkronkan Rasa...</div>
    </div>

    <!-- BACKGROUND SLIDESHOW (Efek Blur Gelap) -->
    <div class="slideshow-bg" id="bg-slideshow">
        <img src="orang1.jpg" class="slide-bg active">
        <img src="orang2.jpg" class="slide-bg">
        <img src="orang3.jpg" class="slide-bg">
        <img src="orang4.jpg" class="slide-bg">
        <img src="orang5.jpg" class="slide-bg">
        <img src="orang6.jpg" class="slide-bg">
        <img src="orang7.jpg" class="slide-bg">
        <img src="orang8.jpg" class="slide-bg">
        <img src="orang9.jpg" class="slide-bg">
        <img src="orang10.jpg" class="slide-bg">
    </div>

    <!-- MAIN INTERFACE -->
    <div class="main-player-container">
        
        <!-- SLIDESHOW DEPAN (Bingkai Estetik) -->
        <div class="fg-slideshow-wrapper" id="fg-slideshow">
            <img src="orang1.jpg" class="fg-slide active">
            <img src="orang2.jpg" class="fg-slide">
            <img src="orang3.jpg" class="fg-slide">
            <img src="orang4.jpg" class="fg-slide">
            <img src="orang5.jpg" class="fg-slide">
            <img src="orang6.jpg" class="fg-slide">
            <img src="orang7.jpg" class="fg-slide">
            <img src="orang8.jpg" class="fg-slide">
            <img src="orang9.jpg" class="fg-slide">
            <img src="orang10.jpg" class="fg-slide">
        </div>

        <!-- PIRINGAN HITAM & TOMBOL PLAY (Di Bawah Slideshow) -->
        <div class="vinyl-wrapper" id="vinyl-container">
            <!-- Gambar Vinyl berputar -->
            <img src="piringan.png" alt="Piringan Hitam" class="vinyl-img">
            
            <!-- Tombol Play terpusat presisi di titik tengah (Pusat Vinyl) -->
            <button class="play-btn" id="master-play-btn" aria-label="Mainkan Musik">
                <!-- Icon Play (Awal) -->
                <svg id="play-icon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                <!-- Icon Pause (Tersembunyi) -->
                <svg id="pause-icon" viewBox="0 0 24 24" style="display:none;"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
            </button>
        </div>

    </div>

    <!-- ELEMEN AUDIO INTERNAL -->
    <audio id="audio-poem" src="puisi.mp3" preload="auto"></audio>

    <script>
        // DOM Elements
        const loader = document.getElementById('loader');
        const audio = document.getElementById('audio-poem');
        const playBtn = document.getElementById('master-play-btn');
        const playIcon = document.getElementById('play-icon');
        const pauseIcon = document.getElementById('pause-icon');
        const vinylContainer = document.getElementById('vinyl-container');
        
        // Slideshow Elements
        const bgSlides = document.querySelectorAll('.slide-bg');
        const fgSlides = document.querySelectorAll('.fg-slide');

        let wakeLockToken = null;

        // 1. Logic Loader Screen
        window.addEventListener('load', () => {
            setTimeout(() => {
                loader.style.opacity = '0';
                loader.style.visibility = 'hidden';
            }, 1500);
        });

        // 2. Logic Dual Slideshow (Background & Foreground)
        let currentSlideIndex = 0;
        function startSlideshow() {
            setInterval(() => {
                // Hapus kelas active dari slide saat ini
                bgSlides[currentSlideIndex].classList.remove('active');
                fgSlides[currentSlideIndex].classList.remove('active');
                
                // Maju ke indeks gambar selanjutnya
                currentSlideIndex = (currentSlideIndex + 1) % bgSlides.length;
                
                // Tambahkan kelas active ke gambar selanjutnya
                bgSlides[currentSlideIndex].classList.add('active');
                fgSlides[currentSlideIndex].classList.add('active');
            }, 4500); // Pergantian dilakukan setiap 4.5 detik untuk efek transisi perlahan
        }
        startSlideshow();

        // 3. WAKE LOCK API (Mencegah Layar Mode Sleep)
        async function activateWakeLock() {
            if ('wakeLock' in navigator) {
                try {
                    wakeLockToken = await navigator.wakeLock.request('screen');
                } catch (err) {
                    console.warn(`Gagal mengaktifkan Wake Lock: ${err.message}`);
                }
            }
        }

        function releaseWakeLock() {
            if (wakeLockToken !== null) {
                wakeLockToken.release();
                wakeLockToken = null;
            }
        }

        // Restart Wake Lock saat membuka kembali tab browser
        document.addEventListener('visibilitychange', async () => {
            if (wakeLockToken !== null && document.visibilityState === 'visible') {
                await activateWakeLock();
            }
        });

        // 4. CONTROLS INTERACTION LOGIC
        playBtn.addEventListener('click', async () => {
            if (audio.paused) {
                // Memutar lagu & Menjalankan animasi rotasi vinyl
                audio.play();
                playIcon.style.display = 'none';
                pauseIcon.style.display = 'block';
                vinylContainer.classList.add('playing');
                
                // Mengaktifkan fitur agar layar terus menyala
                await activateWakeLock();
            } else {
                // Menjeda lagu & rotasi vinyl
                audio.pause();
                playIcon.style.display = 'block';
                pauseIcon.style.display = 'none';
                vinylContainer.classList.remove('playing');
                
                // Menonaktifkan wake lock jika lagu dijeda
                releaseWakeLock();
            }
        });

        // Event saat lagu telah selesai
        audio.addEventListener('ended', () => {
            playIcon.style.display = 'block';
            pauseIcon.style.display = 'none';
            vinylContainer.classList.remove('playing');
            releaseWakeLock();
        });
    </script>
</body>
</html>
