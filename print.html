<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cetak 3 Foto Gabungan - RawBT</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 20px;
            background: #f4f4f4;
        }
        .preview-container {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
            margin: 20px 0;
        }
        .preview {
            max-width: 180px;
            border: 2px solid #333;
            border-radius: 8px;
        }
        #mergedPreview {
            max-width: 420px;
            border: 3px solid #28a745;
            border-radius: 10px;
            margin: 25px auto;
            display: none;
        }
        button {
            padding: 14px 28px;
            font-size: 18px;
            margin: 15px;
            cursor: pointer;
            border: none;
            border-radius: 8px;
            background: #007bff;
            color: white;
        }
        button:hover {
            background: #0056b3;
        }
    </style>
</head>
<body>
    <h1>Gabung 3 Foto → Simpan & Cetak via RawBT</h1>

    <div class="preview-container">
        <div>
            <p><strong>Foto 1</strong></p>
            <input type="file" id="file1" accept="image/*">
            <img id="preview1" class="preview" src="" alt="">
        </div>
        <div>
            <p><strong>Foto 2 (Lebar Acuan)</strong></p>
            <input type="file" id="file2" accept="image/*">
            <img id="preview2" class="preview" src="" alt="">
        </div>
        <div>
            <p><strong>Foto 3</strong></p>
            <input type="file" id="file3" accept="image/*">
            <img id="preview3" class="preview" src="" alt="">
        </div>
    </div>

    <button onclick="mergeAndPrint()">🔗 Gabungkan, Simpan & Cetak</button>

    <img id="mergedPreview" src="" alt="Hasil Gabungan">

    <script>
        let files = [null, null, null];

        function setupPreview(index) {
            document.getElementById(`file${index}`).addEventListener('change', function(e) {
                const file = e.target.files[0];
                if (file) {
                    files[index-1] = file;
                    const reader = new FileReader();
                    reader.onload = function(ev) {
                        document.getElementById(`preview${index}`).src = ev.target.result;
                    };
                    reader.readAsDataURL(file);
                }
            });
        }

        setupPreview(1);
        setupPreview(2);
        setupPreview(3);

        async function mergeAndPrint() {
            if (!files[0] || !files[1] || !files[2]) {
                alert("Harap pilih ketiga foto terlebih dahulu!");
                return;
            }

            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');

            const img1 = await loadImage(files[0]);
            const img2 = await loadImage(files[1]);
            const img3 = await loadImage(files[2]);

            const targetWidth = img2.width;

            const scale1 = targetWidth / img1.width;
            const scale3 = targetWidth / img3.width;

            const height1 = Math.round(img1.height * scale1);
            const height2 = img2.height;
            const height3 = Math.round(img3.height * scale3);

            canvas.width = targetWidth;
            canvas.height = height1 + height2 + height3;

            ctx.drawImage(img1, 0, 0, targetWidth, height1);
            ctx.drawImage(img2, 0, height1, targetWidth, height2);
            ctx.drawImage(img3, 0, height1 + height2, targetWidth, height3);

            const mergedBase64 = canvas.toDataURL('image/jpeg', 0.92);

            // Tampilkan preview
            const preview = document.getElementById('mergedPreview');
            preview.src = mergedBase64;
            preview.style.display = 'block';

            // === 1. Simpan (Download) Foto Gabungan ===
            const downloadLink = document.createElement('a');
            downloadLink.href = mergedBase64;
            downloadLink.download = 'foto-gabungan.jpg';
            document.body.appendChild(downloadLink);
            downloadLink.click();
            document.body.removeChild(downloadLink);

            // === 2. Cetak ke RawBT ===
            const base64Data = mergedBase64.split(',')[1];
            const intentUrl = `rawbt:data:image/jpeg;base64,${base64Data}`;

            const printLink = document.createElement('a');
            printLink.href = intentUrl;
            printLink.style.display = 'none';
            document.body.appendChild(printLink);
            printLink.click();
            document.body.removeChild(printLink);

            alert("✅ Foto gabungan berhasil disimpan dan dikirim ke RawBT!\nPastikan RawBT dalam mode Silent/Auto Print.");
        }

        function loadImage(file) {
            return new Promise((resolve) => {
                const img = new Image();
                img.onload = () => resolve(img);
                const reader = new FileReader();
                reader.onload = (e) => img.src = e.target.result;
                reader.readAsDataURL(file);
            });
        }
    </script>
</body>
</html>
