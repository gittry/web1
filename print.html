<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cetak 3 Foto Gabungan - RawBT</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 20px;
            background: #f4f4f4;
        }
        .preview-container {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
            margin: 20px 0;
        }
        .preview {
            max-width: 180px;
            border: 2px solid #333;
            border-radius: 8px;
        }
        #mergedPreview {
            max-width: 420px;
            border: 3px solid #28a745;
            border-radius: 10px;
            margin: 25px auto;
            display: none;
        }
        button {
            padding: 14px 28px;
            font-size: 18px;
            margin: 15px;
            cursor: pointer;
            border: none;
            border-radius: 8px;
            background: #007bff;
            color: white;
        }
        button:hover { background: #0056b3; }
        button:disabled { background: #6c757d; cursor: not-allowed; }

        /* Loading Animation */
        #loadingOverlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 9999;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            color: white;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid #f3f3f3;
            border-top: 5px solid #28a745;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 15px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <h1>Gabung 3 Foto → Simpan & Cetak via RawBT</h1>

    <div class="preview-container">
        <div>
            <p><strong>Foto 1</strong></p>
            <input type="file" id="file1" accept="image/*">
            <img id="preview1" class="preview" src="" alt="">
        </div>
        <div>
            <p><strong>Foto 2 (Lebar Acuan)</strong></p>
            <input type="file" id="file2" accept="image/*">
            <img id="preview2" class="preview" src="" alt="">
        </div>
        <div>
            <p><strong>Foto 3</strong></p>
            <input type="file" id="file3" accept="image/*">
            <img id="preview3" class="preview" src="" alt="">
        </div>
    </div>

    <button id="actionBtn" onclick="mergeAndPrint()">🔗 Gabungkan, Simpan & Cetak3</button>

    <img id="mergedPreview" src="" alt="Hasil Gabungan">

    <!-- Loading Overlay -->
    <div id="loadingOverlay">
        <div class="spinner"></div>
        <h3 id="loadingText">Menggabungkan foto...</h3>
        <p id="loadingSubtext">Mohon tunggu</p>
    </div>

    <script>
        let files = [null, null, null];

        function setupPreview(index) {
            document.getElementById(`file${index}`).addEventListener('change', function(e) {
                const file = e.target.files[0];
                if (file) {
                    files[index-1] = file;
                    const reader = new FileReader();
                    reader.onload = function(ev) {
                        document.getElementById(`preview${index}`).src = ev.target.result;
                    };
                    reader.readAsDataURL(file);
                }
            });
        }

        setupPreview(1);
        setupPreview(2);
        setupPreview(3);

        async function mergeAndPrint() {
            const btn = document.getElementById('actionBtn');
            if (!files[0] || !files[1] || !files[2]) {
                alert("Harap pilih ketiga foto terlebih dahulu!");
                return;
            }

            btn.disabled = true;
            showLoading("Menggabungkan 3 foto...");

            try {
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');

                const img1 = await loadImage(files[0]);
                const img2 = await loadImage(files[1]);
                const img3 = await loadImage(files[2]);

                const targetWidth = img2.width;
                const scale1 = targetWidth / img1.width;
                const scale3 = targetWidth / img3.width;

                const height1 = Math.round(img1.height * scale1);
                const height2 = img2.height;
                const height3 = Math.round(img3.height * scale3);

                canvas.width = targetWidth;
                canvas.height = height1 + height2 + height3;

                ctx.drawImage(img1, 0, 0, targetWidth, height1);
                ctx.drawImage(img2, 0, height1, targetWidth, height2);
                ctx.drawImage(img3, 0, height1 + height2, targetWidth, height3);

                const mergedBase64 = canvas.toDataURL('image/jpeg', 0.92);

                // Tampilkan preview
                const preview = document.getElementById('mergedPreview');
                preview.src = mergedBase64;
                preview.style.display = 'block';

                // === 1. Simpan Foto Gabungan ===
                showLoading("Menyimpan foto gabungan...");
                const downloadLink = document.createElement('a');
                downloadLink.href = mergedBase64;
                downloadLink.download = `foto-gabungan-${new Date().toISOString().slice(0,10)}.jpg`;
                document.body.appendChild(downloadLink);
                downloadLink.click();
                document.body.removeChild(downloadLink);

                // === Tunggu 2 detik ===
                showLoading("Menyiapkan cetak ke printer...<br>Tunggu 2 detik");
                await new Promise(resolve => setTimeout(resolve, 2000));

                // === 2. Cetak ke RawBT ===
                showLoading("Mengirim ke RawBT...");
                
                const base64Data = mergedBase64.split(',')[1];
                const intentUrl = `rawbt:data:image/jpeg;base64,${base64Data}`;

                const printLink = document.createElement('a');
                printLink.href = intentUrl;
                printLink.style.display = 'none';
                document.body.appendChild(printLink);
                printLink.click();
                document.body.removeChild(printLink);

                // Fallback intent
                setTimeout(() => {
                    const fallback = document.createElement('a');
                    fallback.href = `intent:#Intent;action=android.intent.action.VIEW;data=${encodeURIComponent(intentUrl)};end`;
                    fallback.style.display = 'none';
                    document.body.appendChild(fallback);
                    fallback.click();
                    document.body.removeChild(fallback);
                }, 300);

                hideLoading();
                alert("✅ Foto gabungan berhasil disimpan dan dikirim ke RawBT!");

            } catch (e) {
                hideLoading();
                alert("Terjadi kesalahan: " + e.message);
            }

            btn.disabled = false;
        }

        function loadImage(file) {
            return new Promise((resolve) => {
                const img = new Image();
                img.onload = () => resolve(img);
                const reader = new FileReader();
                reader.onload = (e) => img.src = e.target.result;
                reader.readAsDataURL(file);
            });
        }

        function showLoading(text) {
            document.getElementById('loadingText').innerHTML = text;
            document.getElementById('loadingOverlay').style.display = 'flex';
        }

        function hideLoading() {
            document.getElementById('loadingOverlay').style.display = 'none';
        }
    </script>
</body>
</html>
