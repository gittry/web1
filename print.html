<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kamera B&W - RawBT</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #111; color: white; overflow: hidden; height: 100vh; width: 100vw; }

        #landing {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(0,0,0,0.45), rgba(0,0,0,0.65)), 
                        url('https://images.unsplash.com/photo-1495745966610-2a67f2297e5e?q=80&w=1287&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D') center/cover no-repeat;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 100; transition: opacity 0.8s ease;
        }

        .logo { font-size: 5rem; font-weight: 700; letter-spacing: -5px; margin-bottom: 2rem; text-shadow: 0 4px 25px rgba(0,0,0,0.7); }
        .start-btn {
            background: white; color: black; border: none; padding: 18px 52px;
            font-size: 1.15rem; font-weight: 600; border-radius: 60px; cursor: pointer;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }

        #camera-screen { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: black; }
        #video { width: 100%; height: 100%; object-fit: cover; filter: grayscale(100%) contrast(1.2) brightness(1.05); }

        .header { 
            position: fixed; top: 0; left: 0; width: 100%; padding: 20px; 
            display: flex; justify-content: space-between; align-items: center; 
            z-index: 160; background: linear-gradient(to bottom, rgba(0,0,0,0.7), transparent); 
        }
        .close-btn, .switch-camera { 
            background: rgba(255,255,255,0.15); color: white; border: none; 
            width: 42px; height: 42px; border-radius: 50%; font-size: 1.5rem; cursor: pointer; 
        }

        #playCount {
            background: rgba(255,255,255,0.2);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.95rem;
            font-weight: 600;
        }

        .capture-btn {
            position: fixed; bottom: 45px; left: 50%; transform: translateX(-50%);
            width: 78px; height: 78px; background: rgba(255,255,255,0.95);
            border: 7px solid #111; border-radius: 50%; cursor: pointer; z-index: 150;
            box-shadow: 0 8px 30px rgba(0,0,0,0.6);
            transition: all 0.25s ease;
        }

        #shutter-countdown { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.85); display: none; justify-content: center; align-items: center; 
            z-index: 200; color: white; font-size: 9rem; font-weight: 700; 
        }

        #photo-preview { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: black; display: none; flex-direction: column; z-index: 300; 
        }
        #captured-photo { width: 100%; height: 100%; object-fit: contain; filter: brightness(1.15) contrast(1.1); }

        .preview-actions { 
            position: absolute; bottom: 50px; left: 50%; transform: translateX(-50%); 
            display: flex; gap: 20px; 
        }
        .preview-btn { 
            background: white; color: black; border: none; padding: 14px 36px; 
            border-radius: 50px; font-weight: 600; cursor: pointer; min-width: 140px; 
        }
        .print-btn { background: #00cc66; color: white; }

        #loading { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.9); display: none; flex-direction: column; 
            justify-content: center; align-items: center; z-index: 400; color: white; 
        }
        .spinner { 
            border: 5px solid rgba(255,255,255,0.2); border-top: 5px solid #00cc66; 
            border-radius: 50%; width: 50px; height: 50px; 
            animation: spin 1s linear infinite; margin-bottom: 20px; 
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <!-- Landing Page -->
    <div id="landing">
        <div class="logo">CAM</div>
        <button class="start-btn" onclick="requestCameraPermission()">IZINKAN KAMERA</button>
    </div>

    <!-- Camera Screen -->
    <div id="camera-screen">
        <div class="header">
            <button class="close-btn" onclick="exitCamera()">✕</button>
            <div style="font-size: 1.05rem; font-weight: 500;">B&W CAMERA</div>
            <div style="display: flex; align-items: center; gap: 10px;">
                <button class="switch-camera" onclick="switchCamera()">↔</button>
                <span id="playCount" style="display: none;">0</span>
            </div>
        </div>
        <video id="video" autoplay playsinline></video>
        <div class="capture-btn" id="captureBtn" onclick="startShutterCountdown()"></div>
    </div>

    <!-- Shutter Countdown -->
    <div id="shutter-countdown"><span id="count-text">3</span></div>

    <!-- Photo Preview -->
    <div id="photo-preview">
        <img id="captured-photo" alt="Captured Photo">
        <div class="preview-actions">
            <button class="preview-btn" onclick="saveAndReturn()">Simpan</button>
            <button id="action-btn" class="preview-btn print-btn" onclick="printViaRawBT()">Cetak via RawBT</button>
        </div>
        <button onclick="closePreview()" style="position: absolute; top: 25px; right: 25px; background: rgba(0,0,0,0.6); color: white; border: none; width: 48px; height: 48px; border-radius: 50%; font-size: 1.6rem;">✕</button>
    </div>

    <!-- Loading -->
    <div id="loading">
        <div class="spinner"></div>
        <p id="loading-text">Sedang memproses...</p>
    </div>

    <!-- Audio -->
    <audio id="bgMusic" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
    </audio>

    <script>
        let video = document.getElementById('video');
        let stream = null;
        let wakeLock = null;
        let currentPhotoData = null;
        let currentFacingMode = "user";
        let bgMusic = document.getElementById('bgMusic');
        let toggleCount = 0;
        let isPlaying = false;

        const FILTER = {
            GRAY_RED: 0.32, GRAY_GREEN: 0.55, GRAY_BLUE: 0.13,
            SHADOW_THRESHOLD: 100, SHADOW_BOOST: 1.25,
            MIDTONE_THRESHOLD: 165, MIDTONE_BOOST: 1.35,
            GLOBAL_BRIGHTNESS: 1.10, CONTRAST: 1.08
        };

        async function requestCameraPermission() {
            try {
                stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                document.getElementById('landing').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('landing').style.display = 'none';
                    document.getElementById('camera-screen').style.display = 'block';
                    video.srcObject = stream;
                    video.play();
                    bgMusic.play().catch(() => {});
                    document.getElementById('playCount').style.display = 'block';
                }, 700);
            } catch (err) { alert("Gagal mengakses kamera."); }
        }

        function switchCamera() {
            currentFacingMode = currentFacingMode === "user" ? "environment" : "user";
            if (stream) stream.getTracks().forEach(track => track.stop());
            navigator.mediaDevices.getUserMedia({ video: { facingMode: currentFacingMode } })
                .then(s => { stream = s; video.srcObject = stream; });
        }

        function stopCamera() {
            if (stream) { stream.getTracks().forEach(track => track.stop()); stream = null; }
        }

        function updatePlayCount() {
            const oldCount = toggleCount;
            toggleCount++;
            document.getElementById('playCount').textContent = toggleCount;

            // Jika toggleCount bertambah kecuali dari 0 ke 1 → jalankan Countdown
            if (oldCount >= 1) {
                startShutterCountdown();
            }

            // Tombol merah jika count >= 1
            if (toggleCount >= 1) {
                document.getElementById('captureBtn').style.background = '#ef4444';
            }
        }

        function startShutterCountdown() {
            const countdownEl = document.getElementById('shutter-countdown');
            const countText = document.getElementById('count-text');
            const captureBtn = document.getElementById('captureBtn');
            let count = 3;

            countdownEl.style.display = 'flex';
            countText.textContent = count;

            if (toggleCount >= 1) captureBtn.style.background = '#ef4444';

            const interval = setInterval(() => {
                count--;
                countText.textContent = count;

                if (count <= 0) {
                    clearInterval(interval);
                    countdownEl.style.display = 'none';
                    captureBtn.style.background = 'rgba(255,255,255,0.95)';
                    capturePhoto();   // Tampilkan preview
                }
            }, 900);
        }

        function capturePhoto() {
            if (!stream) return;

            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth || 1280;
            canvas.height = video.videoHeight || 720;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const data = imageData.data;

            for (let i = 0; i < data.length; i += 4) {
                let gray = data[i] * FILTER.GRAY_RED + data[i+1] * FILTER.GRAY_GREEN + data[i+2] * FILTER.GRAY_BLUE;
                if (gray < FILTER.SHADOW_THRESHOLD) gray *= FILTER.SHADOW_BOOST;
                else if (gray < FILTER.MIDTONE_THRESHOLD) gray *= FILTER.MIDTONE_BOOST;
                gray *= FILTER.GLOBAL_BRIGHTNESS;
                gray = Math.min(255, Math.max(0, gray));
                data[i] = data[i+1] = data[i+2] = gray;
            }

            ctx.putImageData(imageData, 0, 0);
            currentPhotoData = canvas.toDataURL('image/jpeg', 0.92);
            
            // Tampilkan Preview
            document.getElementById('captured-photo').src = currentPhotoData;
            document.getElementById('photo-preview').style.display = 'flex';
        }

        // Audio Events
        bgMusic.addEventListener('play', () => {
            if (!isPlaying) {
                isPlaying = true;
                updatePlayCount();
            }
        });

        bgMusic.addEventListener('pause', () => {
            if (isPlaying) {
                isPlaying = false;
                updatePlayCount();
            }
        });

        function closePreview() { document.getElementById('photo-preview').style.display = 'none'; }

        function saveAndReturn() {
            if (!currentPhotoData) return;
            const link = document.createElement('a');
            link.download = `bw-photo-${Date.now()}.jpg`;
            link.href = currentPhotoData;
            link.click();
            returnToHome();
        }

        function printViaRawBT() {
            if (!currentPhotoData) return;
            const link = document.createElement('a');
            link.download = `bw-photo-${Date.now()}.jpg`;
            link.href = currentPhotoData;
            link.click();
            returnToHome();
        }

        function returnToHome() {
            stopCamera();
            bgMusic.pause();
            document.getElementById('camera-screen').style.display = 'none';
            document.getElementById('photo-preview').style.display = 'none';
            document.getElementById('landing').style.display = 'flex';
            document.getElementById('landing').style.opacity = '1';
            currentPhotoData = null;
        }

        function exitCamera() { returnToHome(); }

        window.addEventListener('beforeunload', () => { stopCamera(); });
    </script>
</body>
</html>
