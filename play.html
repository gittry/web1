<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Music Player</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      background: linear-gradient(135deg, #1e1b4b, #312e81);
      min-height: 100vh;
    }
    .counter {
      font-size: 8rem;
      font-weight: 900;
      background: linear-gradient(45deg, #a5b4fc, #c4d0ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 0 40px rgba(165, 180, 252, 0.5);
    }
    #cameraFeed {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 16px;
    }
  </style>
</head>
<body class="flex items-center justify-center min-h-screen text-white">
  <div class="w-full max-w-md mx-auto p-6">
    <!-- Header -->
    <div class="text-center mb-8">
      <h1 class="text-3xl font-bold mb-2">♪ Music Player</h1>
      <p class="text-indigo-300">play.mp3</p>
    </div>

    <!-- Big Counter -->
    <div class="text-center mb-10">
      <p class="text-indigo-400 text-sm mb-2 tracking-widest">JUMLAH PERUBAHAN PLAY/PAUSE</p>
      <div id="counter" class="counter">0</div>
    </div>

    <!-- Player Card -->
    <div class="bg-white/10 backdrop-blur-xl rounded-3xl p-8 shadow-2xl border border-white/20">
      
      <!-- Camera / Album Area -->
      <div id="cameraContainer" class="w-48 h-48 mx-auto mb-8 rounded-2xl overflow-hidden bg-black flex items-center justify-center border border-white/30">
        <video id="cameraFeed" autoplay playsinline muted></video>
        <div id="cameraPlaceholder" class="text-center">
          <span class="text-6xl">📷</span>
          <p class="text-xs text-indigo-300 mt-2">Meminta akses kamera...</p>
        </div>
      </div>

      <div class="text-center mb-8">
        <h2 class="text-2xl font-semibold">Play Song</h2>
        <p class="text-indigo-300">Unknown Artist</p>
      </div>

      <!-- Progress -->
      <div class="mb-6">
        <div class="h-1.5 bg-white/20 rounded-full overflow-hidden">
          <div id="progress" class="h-full w-0 bg-gradient-to-r from-indigo-400 to-purple-500 transition-all duration-200"></div>
        </div>
        <div class="flex justify-between text-xs text-indigo-300 mt-2">
          <span id="currentTime">0:00</span>
          <span id="duration">0:00</span>
        </div>
      </div>

      <!-- Controls -->
      <div class="flex items-center justify-center gap-8">
        <button onclick="prevTrack()" class="text-indigo-300 hover:text-white transition">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-8 h-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
          </svg>
        </button>

        <button id="playPauseBtn" onclick="togglePlay()" 
                class="w-16 h-16 bg-white text-indigo-900 rounded-full flex items-center justify-center hover:scale-105 transition transform active:scale-95">
          <svg id="playIcon" xmlns="http://www.w3.org/2000/svg" class="w-8 h-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132z" />
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 01-9 9m9-9a9 9 0 00-9-9m9 9H3m9 4.01V8" />
          </svg>
        </button>

        <button onclick="nextTrack()" class="text-indigo-300 hover:text-white transition">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-8 h-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
          </svg>
        </button>
      </div>
    </div>
  </div>

  <!-- Audio Element -->
  <audio id="audio" loop preload="auto">
    <source src="play.mp3" type="audio/mpeg">
  </audio>

  <script>
    const audio = document.getElementById('audio');
    const playPauseBtn = document.getElementById('playPauseBtn');
    const playIcon = document.getElementById('playIcon');
    const counterEl = document.getElementById('counter');
    const progressEl = document.getElementById('progress');
    const currentTimeEl = document.getElementById('currentTime');
    const durationEl = document.getElementById('duration');
    const cameraFeed = document.getElementById('cameraFeed');
    const cameraPlaceholder = document.getElementById('cameraPlaceholder');

    let toggleCount = 0;
    let isPlaying = false;

    function updateCounter() {
      toggleCount++;
      counterEl.textContent = toggleCount;
      counterEl.style.transform = 'scale(1.15)';
      setTimeout(() => counterEl.style.transform = 'scale(1)', 180);
    }

    function updateButton() {
      if (isPlaying) {
        playIcon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 9v2m4-2v2m7-5a9 9 0 01-9 9m9-9a9 9 0 00-9-9m9 9H3m9 4.01V8" />`;
      } else {
        playIcon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132z" />
                              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 01-9 9m9-9a9 9 0 00-9-9m9 9H3m9 4.01V8" />`;
      }
    }

    function togglePlay() {
      if (isPlaying) audio.pause();
      else audio.play();
    }

    // Audio State Detection
    audio.addEventListener('play', () => {
      if (!isPlaying) {
        isPlaying = true;
        updateCounter();
        updateButton();
      }
    });

    audio.addEventListener('pause', () => {
      if (isPlaying) {
        isPlaying = false;
        updateCounter();
        updateButton();
      }
    });

    // Progress & Timestamp (Diperbaiki)
    audio.addEventListener('timeupdate', () => {
      if (audio.duration && !isNaN(audio.duration)) {
        const progress = (audio.currentTime / audio.duration) * 100;
        progressEl.style.width = `${progress}%`;
        currentTimeEl.textContent = formatTime(audio.currentTime);
        durationEl.textContent = formatTime(audio.duration);
      }
    });

    // Auto Replay
    audio.addEventListener('ended', () => {
      audio.currentTime = 0;
      audio.play();
    });

    function formatTime(seconds) {
      if (isNaN(seconds)) return "0:00";
      const min = Math.floor(seconds / 60);
      const sec = Math.floor(seconds % 60);
      return `\( {min}: \){sec < 10 ? '0' : ''}${sec}`;
    }

    // ==================== CAMERA ACCESS ====================
    async function startCamera() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ 
          video: { facingMode: "user" } 
        });
        cameraFeed.srcObject = stream;
        cameraPlaceholder.style.display = 'none';
        console.log("Kamera aktif");
      } catch (err) {
        console.error("Gagal mengakses kamera:", err);
        cameraPlaceholder.innerHTML = `
          <span class="text-5xl">📷</span>
          <p class="text-red-400 text-sm mt-2">Akses kamera ditolak</p>
        `;
      }
    }

    // ==================== AUTO PLAY & INIT ====================
    window.addEventListener('load', async () => {
      // Mulai kamera
      await startCamera();

      // Preload & Auto Play Audio
      audio.load(); // Pastikan audio di-load dulu

      setTimeout(() => {
        audio.play().then(() => {
          console.log("Auto play berhasil");
        }).catch(() => {
          console.log("Auto play diblokir, tunggu interaksi user");
        });
      }, 800);
    });

    // Keyboard Support
    document.addEventListener('keydown', (e) => {
      if (e.code === 'Space') {
        e.preventDefault();
        togglePlay();
      }
    });

    // Load metadata
    audio.addEventListener('loadedmetadata', () => {
      durationEl.textContent = formatTime(audio.duration);
    });
  </script>
</body>
</html>
