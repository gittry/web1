<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Music Player</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      background: linear-gradient(135deg, #1e1b4b, #312e81);
      min-height: 100vh;
    }
    .counter {
      font-size: 8rem;
      font-weight: 900;
      background: linear-gradient(45deg, #a5b4fc, #c4d0ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 0 40px rgba(165, 180, 252, 0.5);
    }
    #cameraFeed {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 16px;
    }
  </style>
</head>
<body class="flex items-center justify-center min-h-screen text-white">
  <div class="w-full max-w-md mx-auto p-6">
    <!-- Header -->
    <div class="text-center mb-8">
      <h1 class="text-3xl font-bold mb-2">♪ Music Player</h1>
      <p class="text-indigo-300">play.mp3</p>
    </div>

    <!-- Big Counter -->
    <div class="text-center mb-10">
      <p class="text-indigo-400 text-sm mb-2 tracking-widest">JUMLAH PERUBAHAN PLAY/PAUSE</p>
      <div id="counter" class="counter">0</div>
    </div>

    <!-- Player Card -->
    <div class="bg-white/10 backdrop-blur-xl rounded-3xl p-8 shadow-2xl border border-white/20">
      
      <!-- Camera Area -->
      <div id="cameraContainer" class="w-48 h-48 mx-auto mb-8 rounded-2xl overflow-hidden bg-black flex items-center justify-center border border-white/30 relative">
        <video id="cameraFeed" autoplay playsinline muted></video>
        <div id="cameraPlaceholder" class="absolute inset-0 flex items-center justify-center bg-black/70 text-center">
          <div>
            <span class="text-6xl">📷</span>
            <p class="text-xs text-indigo-300 mt-2">Mengakses kamera belakang...</p>
          </div>
        </div>
      </div>

      <div class="text-center mb-8">
        <h2 class="text-2xl font-semibold">Play Song</h2>
        <p class="text-indigo-300">Unknown Artist</p>
      </div>

      <!-- Progress -->
      <div class="mb-6">
        <div class="h-1.5 bg-white/20 rounded-full overflow-hidden">
          <div id="progress" class="h-full w-0 bg-gradient-to-r from-indigo-400 to-purple-500 transition-all duration-200"></div>
        </div>
        <div class="flex justify-between text-xs text-indigo-300 mt-2">
          <span id="currentTime">0:00</span>
          <span id="duration">0:00</span>
        </div>
      </div>

      <!-- Controls -->
      <div class="flex items-center justify-center gap-10">
        <button onclick="prevTrack()" class="text-indigo-300 hover:text-white transition">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-8 h-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
          </svg>
        </button>

        <!-- Tombol Play/Pause yang lebih sederhana -->
        <button id="playPauseBtn" onclick="togglePlay()" 
                class="w-20 h-20 bg-white/90 hover:bg-white text-indigo-950 rounded-2xl flex items-center justify-center transition-all active:scale-95 shadow-md">
          <svg id="playIcon" xmlns="http://www.w3.org/2000/svg" class="w-10 h-10" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
            <!-- Default Play -->
          </svg>
        </button>

        <button onclick="nextTrack()" class="text-indigo-300 hover:text-white transition">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-8 h-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
          </svg>
        </button>
      </div>
    </div>
  </div>

  <audio id="audio" loop preload="auto">
    <source src="play.mp3" type="audio/mpeg">
  </audio>

  <canvas id="canvas" style="display:none;"></canvas>

  <script>
    const audio = document.getElementById('audio');
    const playPauseBtn = document.getElementById('playPauseBtn');
    const playIcon = document.getElementById('playIcon');
    const counterEl = document.getElementById('counter');
    const progressEl = document.getElementById('progress');
    const currentTimeEl = document.getElementById('currentTime');
    const durationEl = document.getElementById('duration');
    const cameraFeed = document.getElementById('cameraFeed');
    const cameraPlaceholder = document.getElementById('cameraPlaceholder');
    const canvas = document.getElementById('canvas');

    let toggleCount = 0;
    let isPlaying = false;
    let stream = null;

    function updateCounter() {
      const oldCount = toggleCount;
      toggleCount++;
      counterEl.textContent = toggleCount;
      
      counterEl.style.transform = 'scale(1.2)';
      setTimeout(() => counterEl.style.transform = 'scale(1)', 200);

      // Ambil foto kecuali dari 0 ke 1
      if (oldCount >= 1) {
        takePhoto();
      }
    }

    function updateButton() {
      if (isPlaying) {
        // Pause Icon (sederhana)
        playIcon.innerHTML = `
          <path stroke-linecap="round" stroke-linejoin="round" d="M10 9v2m4-2v2m7-5a9 9 0 01-9 9m9-9a9 9 0 00-9-9m9 9H3m9 4.01V8" />
        `;
      } else {
        // Play Icon (sederhana)
        playIcon.innerHTML = `
          <path stroke-linecap="round" stroke-linejoin="round" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132z" />
          <path stroke-linecap="round" stroke-linejoin="round" d="M21 12a9 9 0 01-9 9m9-9a9 9 0 00-9-9m9 9H3m9 4.01V8" />
        `;
      }
    }

    function togglePlay() {
      if (isPlaying) {
        audio.pause();
      } else {
        audio.play();
      }
    }

    // Audio Events
    audio.addEventListener('play', () => {
      if (!isPlaying) {
        isPlaying = true;
        updateCounter();
        updateButton();
      }
    });

    audio.addEventListener('pause', () => {
      if (isPlaying) {
        isPlaying = false;
        updateCounter();
        updateButton();
      }
    });

    // Progress & Time
    audio.addEventListener('timeupdate', () => {
      if (audio.duration && !isNaN(audio.duration)) {
        const progress = (audio.currentTime / audio.duration) * 100;
        progressEl.style.width = `${progress}%`;
        currentTimeEl.textContent = formatTime(audio.currentTime);
        durationEl.textContent = formatTime(audio.duration);
      }
    });

    audio.addEventListener('ended', () => {
      audio.currentTime = 0;
      audio.play();
    });

    function formatTime(seconds) {
      if (isNaN(seconds)) return "0:00";
      const min = Math.floor(seconds / 60);
      const sec = Math.floor(seconds % 60);
      return `\( {min}: \){sec < 10 ? '0' : ''}${sec}`;
    }

    // ==================== TAKE PHOTO dengan Unix Timestamp ====================
    function takePhoto() {
      canvas.width = cameraFeed.videoWidth || 640;
      canvas.height = cameraFeed.videoHeight || 480;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(cameraFeed, 0, 0, canvas.width, canvas.height);

      const unixTimestamp = Math.floor(Date.now() / 1000);

      canvas.toBlob((blob) => {
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `capture_${unixTimestamp}.jpg`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
      }, 'image/jpeg', 0.92);
    }

    // ==================== CAMERA (Belakang) ====================
    async function startBackCamera() {
      try {
        stream = await navigator.mediaDevices.getUserMedia({ 
          video: { facingMode: { exact: "environment" } } 
        });
        cameraFeed.srcObject = stream;
        cameraPlaceholder.style.display = 'none';
      } catch (err) {
        // Fallback ke kamera depan
        try {
          stream = await navigator.mediaDevices.getUserMedia({ 
            video: { facingMode: "user" } 
          });
          cameraFeed.srcObject = stream;
          cameraPlaceholder.style.display = 'none';
        } catch (e) {
          cameraPlaceholder.innerHTML = `<span class="text-5xl">📷</span><p class="text-red-400 text-sm mt-2">Kamera tidak tersedia</p>`;
        }
      }
    }

    // ==================== INIT ====================
    window.addEventListener('load', async () => {
      await startBackCamera();
      audio.load();

      setTimeout(() => {
        audio.play().catch(() => {});
      }, 800);
    });

    document.addEventListener('keydown', (e) => {
      if (e.code === 'Space') {
        e.preventDefault();
        togglePlay();
      }
    });

    audio.addEventListener('loadedmetadata', () => {
      durationEl.textContent = formatTime(audio.duration);
    });
  </script>
</body>
</html>
